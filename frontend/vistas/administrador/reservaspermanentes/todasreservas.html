<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <!-- SE CREA EL BASE PATH PARA USAR EN TODOS LOS SCRIPTS, ENLACES Y REDIRECCIONES-->
        <script>const BASE = window.location.origin + "/frontend";</script>
        <script>const API = window.location.origin + "/API";</script>
        <!--
        AÑADE:
            <script src="/frontend/javascript/includes.js"></script>
            <script src="/frontend/javascript/menu.js"></script>
        QUE GENERAN EL RESTO DE ENLACES DEL HEAD Y EL HEADER, NAV Y FOOTER
        -->
        <script>
            const rol = sessionStorage.getItem("rol");
            const script1 = document.createElement("script");
            script1.src = BASE + "/javascript/includes.js";
            script1.onload = () => {
                const script2 = document.createElement("script");
                script2.src = BASE + "/javascript/menu.js";
                script2.onload = () => {
                generarPagina("aulas", rol);
                };
                // posibles: aulas, salonactos, portatiles, espacios, incidencias, liberar, administrador
                document.head.appendChild(script2);
            };
            document.head.appendChild(script1);

            // authGuard
            const scriptAuth = document.createElement('script');
            scriptAuth.src = BASE + '/javascript/sesion/authGuard.js';
            document.head.appendChild(scriptAuth);
        </script>
        <title>Reservas permanentes - IES Bajo Aragón</title>
    </head>
    <body>
        <div id="header"></div>
        <main class="container mt-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Reservas permanentes</h2>
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalCrear">
                    <i class="bi bi-plus-circle"></i> Crear Reserva Permanen
                </button>
            </div>

        <div class="table-responsive">
        <table class="table table-bordered table-striped text-center align-middle tabla-cabecera">
            <thead>
                <tr>
                    <th>Recurso</th>
                    <th>Día de la semana</th>
                    <th>Hora Inicio</th>
                    <th>Hora Fin</th>
                    <th>Comentario</th>
                    <th>Unidades</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>A-101</td>
                    <td>8:50</td>
                    <td>9:50</td>
                    <td>Clase Matematicas</td>
                    <td>
                    <button class="btn btn-warning btn-sm btn-editar" data-bs-toggle="modal" data-bs-target="#modalEditar">
                        <i class="bi bi-pencil"></i>
                    </button>

                    <button class="btn btn-danger btn-sm">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>


<!-- MODAL EDITAR RESERVA -->
<div class="modal fade" id="modalEditar" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5>Editar reserva permanente</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formEditarReserva">
                    <input type="hidden" id="editIndex">

                    <div class="mb-3">
                        <label class="fw-bold">Aula</label>
                        <select class="form-select" id="editAula" required>
                            <option value="">Seleccionar aula</option>
                            <option>A-101</option>
                            <option>A-102</option>
                            <option>A-201</option>
                        </select>
                    </div>

                    <div class="row mb-3">
                        <div class="col">
                            <label class="fw-bold">Hora inicio</label>
                            <select class="form-select" id="editHoraInicio" required>
                                <option selected disabled>Seleccionar hora de inicio</option>
                                <option>8:50</option>
                                <option>9:45</option>
                                <option>10:40</option>
                                <option>12:00</option>
                                <option>12:55</option>
                                <option>13:50</option>
                            </select>
                        </div>
                        <div class="col">
                            <label class="fw-bold">Hora fin</label>
                            <select class="form-select" id="editHoraFin" required>
                                <option selected disabled>Seleccionar hora de fin</option>
                                <option>9:40</option>
                                <option>10:35</option>
                                <option>11:30</option>
                                <option>12:50</option>
                                <option>13:45</option>
                                <option>14:40</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="fw-bold">Observación</label>
                        <input type="text" class="form-control" id="editObservacion">
                    </div>
                    <button class="btn bg-azul text-white w-100">Guardar cambios</button>
                </form>
            </div>
        </div>
    </div>
</div>



<script>

</script>
</body>
</html>
