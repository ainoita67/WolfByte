<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <!-- SE CREA EL BASE PATH PARA USAR EN TODOS LOS SCRIPTS, ENLACES Y REDIRECCIONES-->

        <script>const API = window.location.origin + "/API";</script>

        AÑADE:
            <script src="/frontend/javascript/includes.js"></script>
            <script src="/frontend/javascript/menu.js"></script>
        QUE GENERAN EL RESTO DE ENLACES DEL HEAD Y EL HEADER, NAV Y FOOTER
        -->

            const rol = sessionStorage.getItem("rol");
            const script1 = document.createElement("script");
            script1.src = BASE + "/javascript/includes.js";
            script1.onload = () => {
                const script2 = document.createElement("script");
                script2.src = BASE + "/javascript/menu.js";
                script2.onload = () => {
                generarPagina("aulas", rol);
                };
                // posibles: aulas, salonactos, portatiles, espacios, incidencias, liberar, administrador
                document.head.appendChild(script2);
            };
            document.head.appendChild(script1);

            // authGuard
            const scriptAuth = document.createElement('script');
            scriptAuth.src = BASE + '/javascript/sesion/authGuard.js';
            document.head.appendChild(scriptAuth);
        </script>
        <title>Reservas permanentes - IES Bajo Aragón</title>
    </head>
    <body>
        <div id="header"></div>
        <main class="container mt-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Reservas permanentes inactivas</h2>

            </div>

        <div class="table-responsive">
        <table class="table table-bordered table-striped text-center align-middle tabla-cabecera">
            <thead>
                <tr>
                    <th>Recurso</th>
                    <th>Día de la semana</th>
                    <th>Hora Inicio</th>
                    <th class="d-none d-md-table-cell">Hora Fin</th>
                    <th class="d-none d-md-table-cell">Comentario</th>
                    <th class="d-none d-md-table-cell">Unidades</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>

            </tbody>
        </table>
    </div>
</main>


<!-- MODAL EDITAR RESERVA -->
<div class="modal fade" id="modalEditar" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
    <div class="modal-dialog">
    <div class="modal-content">
      <!-- Header -->
      <div class="modal-header">
        <h2 class="modal-title">Editar reserva</h2>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <!-- Body / Formulario -->
      <div class="modal-body">
        <form class="row g-4" id="formEditarReserva">

          <div class="col-md-6">
            <label class="form-label">ID</label>
            <input type="text" class="form-control" id="idEditar" required readonly>
          </div>

          <div class="col-md-6">
            <label class="form-label">Recurso</label>
            <input type="text" class="form-control" id="recursoEditar" required readonly>
          </div>

          <div class="col-md-6">
            <label class="form-label">Día de la semana</label>
            <select name="diaEditar" id="diaEditar" class="form-select" required>
              <option value="" disabled>Seleccione un día</option>
              <option value="1">Lunes</option>
              <option value="2">Martes</option>
              <option value="3">Miércoles</option>
              <option value="4">Jueves</option>
              <option value="5">Viernes</option>
            </select>
          </div>

          <div class="col-md-6"></div>

          <div class="col-md-6">
            <label class="form-label">Hora de Inicio</label>
            <input type="time" class="form-control" id="inicioEditar" required>
          </div>

          <div class="col-md-6">
            <label class="form-label">Hora de Fin</label>
            <input type="time" class="form-control" id="finEditar" required>
          </div>

          <div class="col-md-12">
            <label class="form-label">Comentario</label>
            <input type="text" class="form-control" id="comentarioEditar">
          </div>

          <div class="col-md-6">
            <label class="form-label">Unidades</label>
            <input type="number" class="form-control" id="unidadesEditar">
          </div>

          <div class="col-md-6"></div>

          <div class="col-md-6">
            <button type="submit" class="enviar w-100 text-light p-2">Guardar</button>
          </div>

        </form>

      </div>
      <div class="modal-footer">
        <div id="editarUserErrors" class="alert alert-danger d-none"></div>
      </div>
    </div>
    </div>
    </div>


<script type="module">
import { getReservas } from "/frontend/javascript/permanentes/get.js";
import { updatePermanente, desactivePermanente } from "/frontend/javascript/permanentes/put.js";

// Map numérico → día
const diasSemana = {
    1: "Lunes",
    2: "Martes",
    3: "Miércoles",
    4: "Jueves",
    5: "Viernes",
    6: "Sábado",
    0: "Domingo"
};

let reservas = [];

document.addEventListener("DOMContentLoaded", async () => {
    reservas = await getReservas();
    rellenarTablaReservas(reservas);

    // Listener para abrir modal
    document.getElementById("modalEditar").addEventListener("show.bs.modal", async (e) => {
        cargarModalEditar(e);
    });

    // Listener para guardar cambios
    document.getElementById("formEditarReserva").addEventListener("submit", async (e) => {
        e.preventDefault();
        await guardarCambiosReserva();
    });
});

function rellenarTablaReservas(reservas) {
    const tbody = document.querySelector(".tabla-cabecera tbody");
    tbody.innerHTML = "";

    reservas.forEach(reserva => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${reserva.recurso}</td>
            <td>${diasSemana[reserva.dia_semana] || reserva.dia_semana}</td>
            <td>${reserva.inicio}</td>
            <td class="d-none d-md-table-cell">${reserva.fin}</td>
            <td class="d-none d-md-table-cell">${reserva.comentario}</td>
            <td class="d-none d-md-table-cell">${reserva.unidades}</td>
            <td>
                <button class="btn btn-warning btn-sm btn-editar"
                    data-id="${reserva.id}"
                    data-bs-toggle="modal" 
                    data-bs-target="#modalEditar">
                    <i class="bi bi-pencil"></i>
                </button>
                <button 
                    type="button" 
                    class="btn btn-sm btn-success text-white btn-eliminar" 
                    data-id="${reserva.id}" 
                    title="Restaurar">
                    <i class="bi bi-arrow-counterclockwise"></i>
                </button>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

function cargarModalEditar(e) {
    const btn = e.relatedTarget;
    if (!btn) return;

    const id = Number(btn.dataset.id);
    const reserva = reservas.find(r => Number(r.id) === id);
    if (!reserva) return console.error("Reserva no encontrada");

    // Rellenar modal
    document.getElementById("idEditar").value = reserva.id;
    document.getElementById("recursoEditar").value = reserva.recurso ?? "";
    document.getElementById("diaEditar").value = reserva.dia_semana ?? "";
    document.getElementById("inicioEditar").value = reserva.inicio ?? "";
    document.getElementById("finEditar").value = reserva.fin ?? "";
    document.getElementById("comentarioEditar").value = reserva.comentario !== " - " ? reserva.comentario : "";
    document.getElementById("unidadesEditar").value = reserva.unidades !== " - " ? reserva.unidades : "";
}

async function guardarCambiosReserva() {
    const id = Number(document.getElementById("idEditar").value);
    const recurso = document.getElementById("recursoEditar").value;
    const dia_semana = Number(document.getElementById("diaEditar").value);
    const inicio = document.getElementById("inicioEditar").value;
    const fin = document.getElementById("finEditar").value;
    const comentario = document.getElementById("comentarioEditar").value.trim() || null;
    const unidades = Number(document.getElementById("unidadesEditar").value) || null;

    const reservaActualizada = { id, recurso, dia_semana, inicio, fin, comentario, unidades };

    try {
        await updatePermanente(reservaActualizada);

        // Actualizar array local
        reservas = await getReservas();
        rellenarTablaReservas(reservas);

        // Cerrar modal
        bootstrap.Modal.getInstance(document.getElementById("modalEditar")).hide();
        alert("Reserva actualizada correctamente");
    } catch (err) {
        console.error(err);
        alert(err?.message ?? "Error al actualizar la reserva");
    }
}

// Delegación de eventos para eliminar reservas
document.addEventListener("click", async (e) => {
    const btn = e.target.closest(".btn-eliminar");
    if (!btn) return;

    const id = Number(btn.dataset.id);
    const reserva = reservas.find(r => r.id === id);
    if (!reserva) return alert("Reserva no encontrada");

    const ok = confirm(`¿Seguro que deseas restaurar la reserva del recurso ${reserva.recurso}?`);
    if (!ok) return;

    try {
        await desactivePermanente(reserva.id);

        // Actualizar array local
        reservas = await getReservas();
        rellenarTablaReservas(reservas);
        alert("Reserva restaurada correctamente");
    } catch (err) {
        console.error(err);
        alert(err?.message ?? "Error al restaurar la reserva");
    }
});
</script>
</body>
</html>
