<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <!-- SE CREA EL BASE PATH PARA USAR EN TODOS LOS SCRIPTS, ENLACES Y REDIRECCIONES-->
        <script>const BASE = window.location.origin + "/frontend";</script>
        <script>const API = window.location.origin + "/API";</script>
        <!--
        AÑADE:
            <script src="/frontend/javascript/includes.js"></script>
            <script src="/frontend/javascript/menu.js"></script>
        QUE GENERAN EL RESTO DE ENLACES DEL HEAD Y EL HEADER, NAV Y FOOTER
        -->
        <script>
            const rol = sessionStorage.getItem("rol");
            const script1 = document.createElement("script");
            script1.src = BASE + "/javascript/includes.js";
            script1.onload = () => {
                const script2 = document.createElement("script");
                script2.src = BASE + "/javascript/menu.js";
                script2.onload = () => {
                generarPagina("aulas", rol);
                };
                // posibles: aulas, salonactos, portatiles, espacios, incidencias, liberar, administrador
                document.head.appendChild(script2);
            };
            document.head.appendChild(script1);

            // authGuard
            const scriptAuth = document.createElement('script');
            scriptAuth.src = BASE + '/javascript/sesion/authGuard.js';
            document.head.appendChild(scriptAuth);
        </script>
        <title>Reservas permanentes - IES Bajo Aragón</title>
    </head>
    <body>
        <div id="header"></div>
        <main>

        <div class="container-fluid p-4">
            <div class="row g-4">

            <aside class="d-none d-lg-block col-lg-2 mb-4"><!--vacio para dar margen--></aside>
            
            <section class="col-12 col-lg-8 d-flex flex-column mb-2 mb-lg-5">
                <div class="d-flex justify-content-between align-items-center my-4">
                    <h2>Reservas permanentes</h2>
                    <button class="btn btn-success btn-sm btn-crear"
                        data-bs-toggle="modal" 
                        data-bs-target="#modalCrear">
                        <i class="bi bi-plus"></i> Crear Reserva Permanente
                    </button>
                </div>
                <table class="table table-bordered table-striped text-center align-middle tabla-cabecera">
                    <thead>
                        <tr>
                            <th>Recurso</th>
                            <th>Día de la semana</th>
                            <th>Hora Inicio</th>
                            <th class="d-none d-md-table-cell">Hora Fin</th>
                            <th class="d-none d-md-table-cell">Comentario</th>
                            <th class="d-none d-md-table-cell">Unidades</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>

                    </tbody>
                </table>
            </section>
            <!-- ASIDE INFORMACIÓN -->
            <aside class="col-12 col-lg-2 mb-5">
                <div class="d-none d-lg-block" style="height: 4.5rem;"></div>
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title" id="info-id">Recusrso</h5>
                        <hr>

                        <p><strong>Descripción: </strong></p>
                        <p id="info-descripcion" class="text-muted small"></p>

                        <p id="infoTipo"><strong>Tipo: </strong> <span id="info-tipo"></span></p>

                        <p><strong>Edificio: </strong> <span id="info-edificio"></span></p>
                        <p><strong>Planta: </strong> <span id="info-planta"></span></p>

                        <p id="infoCaracteristicas"><strong>Características:</strong></p>
                        <ul id="info-caracteristicas" class="small"></ul>

                        <p><strong>Requiere autorización: </strong> <span id="info-especial"></span></p>

                        <p id="infoUnidades"><strong>Unidades: </strong> <span id="info-unidades"></span></p>

                        <p id="infoEsAula"><strong>Es un aula: </strong> <span id="info-es-aula"></span></p>



                    </div>
                </div>
            </aside>
        </div>
    </div>
        <div class="divvolver container p-0 pb-3 mt-0 mb-5 pe-4 pe-md-0 text-end fs-5">
        <button onclick="window.history.back()" class="bg-azul rounded-pill p-2 px-3 ms-5 text-light"><i class="bi bi-caret-left-fill"></i> Volver</button>
    </div>
    </main>


<!-- MODAL EDITAR RESERVA -->
<div class="modal fade" id="modalEditar" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
    <div class="modal-dialog">
    <div class="modal-content">
      <!-- Header -->
      <div class="modal-header">
        <h2 class="modal-title">Editar reserva</h2>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <!-- Body / Formulario -->
      <div class="modal-body">
        <form class="row g-4" id="formEditarReserva">

          <div class="col-md-6">
            <label class="form-label">ID</label>
            <input type="text" class="form-control" id="idEditar" required readonly>
          </div>

          <div class="col-md-6">
            <label class="form-label">Recurso</label>
            <input type="text" class="form-control" id="recursoEditar" required readonly>
          </div>

          <div class="col-md-6">
            <label class="form-label">Día de la semana</label>
            <select name="diaEditar" id="diaEditar" class="form-select" required>
              <option value="" disabled>Seleccione un día</option>
              <option value="1">Lunes</option>
              <option value="2">Martes</option>
              <option value="3">Miércoles</option>
              <option value="4">Jueves</option>
              <option value="5">Viernes</option>
            </select>
          </div>

          <div class="col-md-6"></div>

          <div class="col-md-6">
            <label class="form-label">Hora de Inicio</label>
            <input type="time" class="form-control" id="inicioEditar" required>
          </div>

          <div class="col-md-6">
            <label class="form-label">Hora de Fin</label>
            <input type="time" class="form-control" id="finEditar" required>
          </div>

          <div class="col-md-12">
            <label class="form-label">Comentario</label>
            <input type="text" class="form-control" id="comentarioEditar">
          </div>

          <div class="col-md-6" id="unidadesEditar">
            <label class="form-label">Unidades</label>
            <input type="number" class="form-control">
          </div>

          <div class="col-md-6"></div>

          <div class="col-md-6">
            <button type="submit" class="enviar w-100 text-light p-2">Guardar</button>
          </div>

        </form>

      </div>
      <div class="modal-footer">
        <div id="editarUserErrors" class="alert alert-danger d-none"></div>
      </div>
    </div>
    </div>
</div>

<!-- MODAL CREAR RESERVA -->
<div class="modal fade" id="modalCrear" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1">
    <div class="modal-dialog">
    <div class="modal-content">

        <div class="modal-header">
            <h2 class="modal-title">Crear reserva permanente</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">

        <form class="row g-4" id="formCrearReserva">

            <div class="col-md-6">
            <label class="form-label">Recurso</label>
            <input type="text" class="form-control" id="recursoCrear" readonly>
            </div>

            <div class="col-md-6">
            <label class="form-label">Día de la semana</label>
            <select id="diaCrear" class="form-select" required>
            <option value="" disabled selected>Seleccione un día</option>
            <option value="1">Lunes</option>
            <option value="2">Martes</option>
            <option value="3">Miércoles</option>
            <option value="4">Jueves</option>
            <option value="5">Viernes</option>
            </select>
            </div>

            <div class="col-md-6">
            <label class="form-label">Hora inicio</label>
            <input type="time" class="form-control" id="inicioCrear" required>
            </div>

            <div class="col-md-6">
            <label class="form-label">Hora fin</label>
            <input type="time" class="form-control" id="finCrear" required>
            </div>

            <div class="col-md-12">
            <label class="form-label">Comentario</label>
            <input type="text" class="form-control" id="comentarioCrear">
            </div>

            <div class="col-md-6"  id="unidadesCrear">
            <label class="form-label">Unidades</label>
            <input type="number" class="form-control">
            </div>

            <div class="col-md-6"></div>

            <div class="col-md-6">
            <button type="submit" class="enviar w-100 text-light p-2">
            Crear reserva
            </button>
            </div>

        </form>

        </div>

        <div class="modal-footer">
        <div id="crearReservaErrors" class="alert alert-danger d-none"></div>
        </div>

    </div>
    </div>
</div>


<script type="module">
import { getReservasRecurso } from "/frontend/javascript/permanentes/get.js";
import { updatePermanente, desactivePermanente } from "/frontend/javascript/permanentes/put.js";
import { createPermanente } from "/frontend/javascript/permanentes/post.js";

const params = new URLSearchParams(window.location.search);
const idRecurso = params.get("id");

// Map numérico → día
const diasSemana = {
    1: "Lunes",
    2: "Martes",
    3: "Miércoles",
    4: "Jueves",
    5: "Viernes",
    6: "Sábado",
    0: "Domingo"
};

let reservas = [];

document.addEventListener("DOMContentLoaded", async () => {
    reservas = await getReservasRecurso(idRecurso);
    rellenarTablaReservas(reservas);

    cargarInfo(idRecurso);

    // Listener para abrir modal
    document.getElementById("modalEditar").addEventListener("show.bs.modal", async (e) => {
        cargarModalEditar(e);
    });

    // Listener para guardar cambios
    document.getElementById("formEditarReserva").addEventListener("submit", async (e) => {
        e.preventDefault();
        await guardarCambiosReserva();
    });

    // Listener para abrir modal de creación
    document.getElementById("modalCrear").addEventListener("show.bs.modal", () => {
        document.getElementById("recursoCrear").value = idRecurso;
    });

    // Listener para crear reserva
    document
    .getElementById("formCrearReserva")
    .addEventListener("submit", async (e) => {
        e.preventDefault();
        await crearReserva();
    });

});

function rellenarTablaReservas(reservas) {
    const tbody = document.querySelector(".tabla-cabecera tbody");
    tbody.innerHTML = "";

    reservas.forEach(reserva => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${reserva.recurso}</td>
            <td>${diasSemana[reserva.dia_semana] || reserva.dia_semana}</td>
            <td>${reserva.inicio}</td>
            <td class="d-none d-md-table-cell">${reserva.fin}</td>
            <td class="d-none d-md-table-cell">${reserva.comentario}</td>
            <td class="d-none d-md-table-cell">${reserva.unidades}</td>
            <td>
                <button class="btn btn-warning btn-sm btn-editar"
                    data-id="${reserva.id}"
                    data-bs-toggle="modal" 
                    data-bs-target="#modalEditar">
                    <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-danger btn-sm btn-eliminar" data-id="${reserva.id}">
                    <i class="bi bi-trash"></i>
                </button>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

function cargarModalEditar(e) {
    const btn = e.relatedTarget;
    if (!btn) return;

    const id = Number(btn.dataset.id);
    const reserva = reservas.find(r => Number(r.id) === id);
    if (!reserva) return console.error("Reserva no encontrada");

    // Rellenar modal
    document.getElementById("idEditar").value = reserva.id;
    document.getElementById("recursoEditar").value = reserva.recurso ?? "";
    document.getElementById("diaEditar").value = reserva.dia_semana ?? "";
    document.getElementById("inicioEditar").value = reserva.inicio ?? "";
    document.getElementById("finEditar").value = reserva.fin ?? "";
    document.getElementById("comentarioEditar").value = reserva.comentario !== " - " ? reserva.comentario : "";
    document.getElementById("unidadesEditar").value = reserva.unidades !== " - " ? reserva.unidades : "";
}

async function guardarCambiosReserva() {
    const id = Number(document.getElementById("idEditar").value);
    const recurso = document.getElementById("recursoEditar").value;
    const dia_semana = Number(document.getElementById("diaEditar").value);
    const inicio = document.getElementById("inicioEditar").value;
    const fin = document.getElementById("finEditar").value;
    const comentario = document.getElementById("comentarioEditar").value.trim() || null;
    const unidades = Number(document.getElementById("unidadesEditar").value) || null;

    const reservaActualizada = { id, recurso, dia_semana, inicio, fin, comentario, unidades };

    try {
        await updatePermanente(reservaActualizada);

        // Actualizar array local
        reservas = await getReservasRecurso(idRecurso);
        rellenarTablaReservas(reservas);

        // Cerrar modal
        bootstrap.Modal.getInstance(document.getElementById("modalEditar")).hide();
        alert("Reserva actualizada correctamente");
    } catch (err) {
        console.error(err);
        alert(err?.message ?? "Error al actualizar la reserva");
    }
}

async function crearReserva() {

    const recurso = idRecurso;
    const dia_semana = Number(document.getElementById("diaCrear").value);
    const inicio = document.getElementById("inicioCrear").value;
    const fin = document.getElementById("finCrear").value;
    const comentario = document.getElementById("comentarioCrear").value.trim() || null;
    const unidades = Number(document.getElementById("unidadesCrear").value) || null;

    const nuevaReserva = {
        recurso,
        dia_semana,
        inicio,
        fin,
        comentario,
        unidades
    };

    try {

        await createPermanente(nuevaReserva);

        reservas = await getReservasRecurso(idRecurso);
        rellenarTablaReservas(reservas);

        bootstrap.Modal.getInstance(document.getElementById("modalCrear")).hide();

        document.getElementById("formCrearReserva").reset();

        alert("Reserva creada correctamente");

    } catch (err) {

        console.error(err);
        alert(err?.message ?? "Error al crear la reserva");

    }

}

// Delegación de eventos para eliminar reservas
document.addEventListener("click", async (e) => {
    const btn = e.target.closest(".btn-eliminar");
    if (!btn) return;

    const id = Number(btn.dataset.id);
    const reserva = reservas.find(r => r.id === id);
    if (!reserva) return alert("Reserva no encontrada");

    const ok = confirm(`¿Seguro que deseas eliminar la reserva del recurso ${reserva.recurso}?`);
    if (!ok) return;

    try {
        await desactivePermanente(reserva.id);

        // Actualizar array local
        reservas = await getReservasRecurso(idRecurso);
        rellenarTablaReservas(reservas);
        alert("Reserva eliminada correctamente");
    } catch (err) {
        console.error(err);
        alert(err?.message ?? "Error al eliminar la reserva");
    }
});

import { getInfoRecurso } from "/frontend/javascript/recursos/get.js";

async function cargarInfo(id) {
    const recurso = await getInfoRecurso(id);

    if (!recurso) return;

    if (recurso.tipo === "Espacio") {
        // Ocultar sección de unidades ten todos lados
        const infoUnidades = document.getElementById("infoUnidades");
        const editarUnidades = document.getElementById("unidadesEditar");
        const crearUnidades = document.getElementById("unidadesCrear");
        infoUnidades.style.display = "none";
        editarUnidades.style.display = "none";
        editarUnidades.value = null;
        crearUnidades.style.display = "none";
        crearUnidades.value = null;

        //mostrar si es aula o no
        const infoEsAula = document.getElementById("infoEsAula");
        infoEsAula.style.display = "block";
        const spanEsAula = document.getElementById("info-es-aula");
        spanEsAula.textContent = recurso.es_aula ? "Sí" : "No";

        //Características
        const infoCaracteristicas = document.getElementById("infoCaracteristicas");
        const infoCaracteristicasUl = document.getElementById("info-caracteristicas");
        if (recurso.caracteristicas.length > 0) {
            infoCaracteristicas.style.display = "block";
            infoCaracteristicasUl.style.display = "block";
            infoCaracteristicasUl.textContent = "";
            recurso.caracteristicas.forEach(caracteristica => {
                const li = document.createElement('li');
                li.textContent = caracteristica;
                infoCaracteristicasUl.appendChild(li);
            });
        } else {
            infoCaracteristicas.style.display = "none";
            infoCaracteristicasUl.style.display = "none";
        }

        //mostrar tipo
        const infoTipo = document.getElementById("info-tipo");
        infoTipo.textContent = recurso.tipo;

    } else if (recurso.tipo === "Material") {
        // mostrar sección de unidades ten todos lados
        const infoUnidades = document.getElementById("infoUnidades");
        const editarUnidades = document.getElementById("unidadesEditar");
        const crearUnidades = document.getElementById("unidadesCrear");
        const infoUnidadesSpan = document.getElementById("info-unidades");
        infoUnidades.style.display = "block";
        editarUnidades.style.display = "block";
        crearUnidades.style.display = "block";
        infoUnidadesSpan.textContent = recurso.unidades !== null ? recurso.unidades : "N/A";
        
        //Características
        const infoCaracteristicas = document.getElementById("infoCaracteristicas");
        const infoCaracteristicasUl = document.getElementById("info-caracteristicas");
        infoCaracteristicas.style.display = "none";
        infoCaracteristicasUl.style.display = "none";
        
        //ocultar si es aula o no
        const infoEsAula = document.getElementById("infoEsAula");
        infoEsAula.style.display = "none";

        //mostrar tipo
        const infoTipo = document.getElementById("info-tipo");
        infoTipo.textContent = "Carrito de portátiles";
    }

    document.getElementById("info-id").textContent = 'Recurso ' + recurso.id;
    document.getElementById("info-descripcion").textContent = recurso.descripcion;
    document.getElementById("info-edificio").textContent = recurso.nombre_edificio;
    document.getElementById("info-planta").textContent = recurso.nombre_planta;



    document.getElementById("info-especial").textContent =
    recurso.especial ? "Sí" : "No";

}
</script>
</body>
</html>
