<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <script>const BASE = window.location.origin + "/frontend";</script>

    <script>
        const script1 = document.createElement("script");
        script1.src = BASE + "/javascript/includes.js";
        script1.onload = () => {
            const script2 = document.createElement("script");
            script2.src = BASE + "/javascript/menu.js";
            script2.onload = () => {
                generarPagina("admin", "admin");
            };
            document.head.appendChild(script2);
        };
        document.head.appendChild(script1);
    </script>

    <title>Características - IES Bajo Aragón</title>
    <style>
        #alert-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            max-width: 350px;
        }
        .alert {
            margin-bottom: 10px;
            animation: slideIn 0.3s ease-in-out;
        }
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .bg-azul {
            background-color: #0d6efd;
        }
        .card-head {
            background-color: #0d6efd;
        }
        .modal-backdrop {
            z-index: 1040 !important;
        }
        .modal {
            z-index: 1050 !important;
        }
    </style>
</head>

<body>

    <div id="header"></div>

    <main class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Características</h2>
            <button class="btn btn-success" id="btnCrear">
                <i class="bi bi-plus-circle"></i> Crear Característica
            </button>
        </div>

        <!-- Tarjetas de características -->
        <div class="row g-4" id="contenedorCaracteristicas">
            <!-- Datos -->
        </div>

        <!-- Volver -->
        <div class="divvolver container p-0 pb-3 mb-5 mt-4 text-end fs-5">
            <a href="../../menuadministrador.html" class="bg-azul rounded-pill p-2 px-3 text-light text-decoration-none">
                <i class="bi bi-caret-left-fill"></i> Volver
            </a>
        </div>
    </main>

    <!-- Modal Crear Característica -->
    <div class="modal fade" id="modalCrearCaracteristica" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">
                        <i class="bi bi-plus-circle"></i> Crear Característica
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formCrearCaracteristica">
                        <div class="mb-3">
                            <label class="form-label">Nombre de la característica</label>
                            <input type="text" class="form-control" id="crearNombre" 
                                   placeholder="Ej. Proyector HD" required maxlength="100">
                            <div class="form-text">Mínimo 3 caracteres, máximo 100</div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="bi bi-x-lg"></i> Cancelar
                    </button>
                    <button type="submit" form="formCrearCaracteristica" class="btn btn-success">
                        <i class="bi bi-check2"></i> Crear
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Editar Característica -->
    <div class="modal fade" id="modalEditarCaracteristica" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-warning text-white">
                    <h5 class="modal-title">
                        <i class="bi bi-pencil-square"></i> Editar Característica
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formEditarCaracteristica">
                        <input type="hidden" id="editId">
                        <div class="mb-3">
                            <label class="form-label">Nombre de la característica</label>
                            <input type="text" class="form-control" id="editNombre" 
                                   placeholder="Ej. Proyector HD" required maxlength="100">
                            <div class="form-text">Mínimo 3 caracteres, máximo 100</div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="bi bi-x-lg"></i> Cancelar
                    </button>
                    <button type="submit" form="formEditarCaracteristica" class="btn btn-warning text-white">
                        <i class="bi bi-check2"></i> Guardar cambios
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Confirmar Eliminación -->
    <div class="modal fade" id="modalConfirmarEliminar" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">
                        <i class="bi bi-exclamation-triangle-fill"></i> Confirmar Eliminación
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="text-center">
                        <i class="bi bi-exclamation-triangle-fill text-danger fs-1 mb-3"></i>
                        <p class="fs-5">
                            ¿Estás seguro de eliminar la característica "<span id="nombreCaracteristicaEliminar" class="fw-bold"></span>"?
                        </p>
                        <p class="text-muted">Esta acción no se puede deshacer.</p>
                    </div>
                    <input type="hidden" id="idCaracteristicaEliminar">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="bi bi-x-lg"></i> Cancelar
                    </button>
                    <button type="button" class="btn btn-danger" id="btnConfirmarEliminar">
                        <i class="bi bi-trash"></i> Sí, Eliminar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer id="footer"></footer>
</body>
<script type="module" src="../../../../javascript/espaiciocaracteristicas/espaciocaracteristicas.js"></script>

</html>
