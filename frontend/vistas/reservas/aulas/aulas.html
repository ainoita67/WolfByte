<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <!-- PRIMERO: Definir BASE -->
        <script>const BASE = window.location.origin + "/frontend";</script>
        <script>const API = window.location.origin + "/API";</script>

        <!-- Cargar authGuard PRIMERO -->
        <script src="/frontend/javascript/sesion/authGuard.js"></script>
        <script>
            const rol = Number(sessionStorage.getItem("rol"));
            
            const script1 = document.createElement("script");
            script1.src = BASE + "/javascript/includes.js";
            script1.onload = () => {
                const script2 = document.createElement("script");
                script2.src = BASE + "/javascript/menu.js";
                script2.onload = () => {
                    generarPagina("aulas", rol);
                };
                // posibles: aulas, salonactos, portatiles, espacios, incidencias, liberar, administrador
                document.head.appendChild(script2);
            };
            document.head.appendChild(script1);
        </script>
        <title>Aula - IES Bajo Aragón</title>
    </head>
    <body>

        <div id="header"></div>
        <main class="container mt-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="text-center">Aulas disponibles</h2>
                <button class="btn bg-verde text-light" data-bs-toggle="modal" data-bs-target="#modalFiltrar">
                    <i class="bi bi-filter"></i> Filtrar
                </button>
            </div>
            <div class="contenedor-aulas mb-5">

            
            </div>

            <!--Modal filtrar-->
            <div class="modal fade" id="modalFiltrar" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title"><i class="bi bi-filter me-2"></i>Filtrar aulas</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <form id="formFiltrarAulas" class="px-3">
                            <div class="modal-body">
                                <div class="row">
                                    <div class="col-12 mb-3">
                                        <label class="form-label" for="caracteristicas">Características</label>
                                        <select class="form-select" id="caracteristicas" multiple size="3">
                                            <!-- Opciones generadas dinámicamente -->
                                        </select>
                                        <div class="form-text">Mantén Ctrl (Windows) / Cmd (Mac) para seleccionar varias.</div>
                                    </div>
                                    
                                    <div class="col-12 col-md-6 mb-3">
                                        <label class="form-label" for="f_fecha">Fecha</label>
                                        <input type="date" class="form-control" id="f_fecha">
                                    </div>
                                    <div class="col-12 col-md-3 mb-3">
                                        <label class="form-label" for="f_hora_inicio">Hora inicio</label>
                                        <input type="time" class="form-control" id="f_hora_inicio">
                                    </div>
                                    <div class="col-12 col-md-3 mb-3">
                                        <label class="form-label" for="f_hora_fin">Hora fin</label>
                                        <input type="time" class="form-control" id="f_hora_fin">
                                    </div>
                                </div>
                            </div>
                            <div class="modal-footer d-flex justify-content-between">
                                <button type="submit" class="col-3 btn bg-azul border text-light rounded-3" data-bs-dismiss="modal"><i class="bi bi-check2"></i> Aplicar filtros</button>
                                <button type="reset" class="col-3 btn bg-verde border text-light rounded-3"><i class="bi bi-arrow-clockwise"></i> Restablecer</button>
                                <button type="button" class="col-3 btn bg-lightgrey border text-dark rounded-3" data-bs-dismiss="modal"><i class="bi bi-x-lg"></i> Cerrar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="divvolver container p-0 pb-3 mt-0 mb-5 pe-4 pe-md-0 text-end fs-5">
                <a href="../../menu.html" class="bg-azul rounded-pill p-2 px-3 ms-5 text-light"><i class="bi bi-caret-left-fill"></i> Volver</a>
            </div>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>

<script type="module">
import { getAulas, getAulasDisponibles } from "/frontend/javascript/espacio/aulas.js";
import { getCaracteristicas } from "/frontend/javascript/espacio/caracteristicas.js";

const filtros = {
    caracteristicas: []
};

sessionStorage.setItem("filtrosAulas", JSON.stringify(filtros));

document.addEventListener("DOMContentLoaded", async () => {
    await cargarCaracteristicas();

    const form = document.getElementById("formFiltrarAulas");

    filtrosGuardadosyCrearTarjetas();

    //al enviar el formulario de filtrar
    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const fecha = document.getElementById("f_fecha").value;
        const horaInicio = document.getElementById("f_hora_inicio").value || "00:00";
        const horaFin = document.getElementById("f_hora_fin").value || "23:59";

        const select = document.getElementById("caracteristicas");
        let caracteristicasSeleccionadas = Array.from(select.selectedOptions)
        .map(opt => opt.value);

        let data;

        // Si los tres campos tienen valor → disponibilidad
        if (fecha && horaInicio && horaFin) {
            data = await getAulasDisponibles(fecha, horaInicio, horaFin);
        } else {
            // Si falta alguno → todas las aulas
            data = await getAulas();
        }

        crearTarjetas(data, caracteristicasSeleccionadas);
    });

    form.addEventListener("reset", async () => {
        setTimeout(async () => {
            const data = await getAulas();
            crearTarjetas(data, []);
        }, 0);
    });
});

function crearTarjetas(data, caracteristicasSeleccionadas = []) {
    const contenedor = document.querySelector(".contenedor-aulas");
    contenedor.innerHTML = ""; // limpiar contenido estático
    // data = { edificio: { planta: [aulas] } }
    
    if(!data||data.length==0){
        let card = document.createElement("div");
        card.className = "card h-100 p-0 m-0 reserva-card text-center";
        card.innerHTML = `
            <div class="card-body bg-secondary-subtle">No se han encontrado espacios</div>
        `;
        contenedor.appendChild(card);
    }else{
        for (const [edificio, plantas] of Object.entries(data)) {

            // --- Tarjeta edificio ---
            const edificioCard = document.createElement("div");
            edificioCard.className = "edificio-card";

            const tituloEdificio = document.createElement("h3");
            tituloEdificio.textContent = edificio.toUpperCase();
            edificioCard.appendChild(tituloEdificio);

            // --- Plantas ---
            for (const [planta, aulas] of Object.entries(plantas)) {

                const plantaDiv = document.createElement("div");
                plantaDiv.className = "planta";

                const plantaTitulo = document.createElement("span");
                plantaTitulo.className = "planta-titulo";
                plantaTitulo.textContent = planta;
                plantaDiv.appendChild(plantaTitulo);

                const aulasDiv = document.createElement("div");
                aulasDiv.className = "aulas";

                // --- Botones de aulas ---
                aulas.forEach(aula => {
                    const btn = document.createElement("button");
                    btn.id = aula.id_recurso;
                    btn.className = "aula";
                    btn.textContent = aula.id_recurso;

                    btn.title = aula.descripcion;

                    // si tiene reservas marcar
                    if (aula.reservas > 0) {
                        btn.classList.add("ocupada");
                        if(aula.reservas==1){
                            btn.title += ` - ${aula.reservas} reserva en este horario`;
                        }else{
                            btn.title += ` - ${aula.reservas} reservas en este horario`;
                        }
                    }

                    //caracteristicas seleccionadas → comprobar si el aula las cumple
                    if (caracteristicasSeleccionadas.length > 0) {

                        const aulaCaracteristicas = aula.caracteristicas || [];

                        // comprobar si tiene TODAS las seleccionadas
                        const cumple = caracteristicasSeleccionadas.every(c =>
                            aulaCaracteristicas.includes(c)
                        );

                        if (!cumple) {
                            btn.classList.add("no-cumple");

                            btn.title += " - No cumple con las características seleccionadas";
                        }
                    }

                    // REDIRECCIÓN
                    btn.addEventListener("click", () => {
                        // Guardar estado actual del filtro
                        const filtros = {
                            fecha: document.getElementById("f_fecha").value,
                            horaInicio: document.getElementById("f_hora_inicio").value,
                            horaFin: document.getElementById("f_hora_fin").value,
                            caracteristicas: Array.from(
                                document.getElementById("caracteristicas").selectedOptions
                            ).map(opt => opt.value)
                        };

                        sessionStorage.setItem("filtrosAulas", JSON.stringify(filtros));

                        const id = aula.id_recurso;
                        const especial = aula.autorizacion ? 1 : 0;
                        window.location.href = `${BASE}/vistas/reservas/aulas/vistasemanal.html?id=${encodeURIComponent(id)}&especial=${encodeURIComponent(especial )}`;
                    });
                    aulasDiv.appendChild(btn);
                });

                plantaDiv.appendChild(aulasDiv);
                edificioCard.appendChild(plantaDiv);
            }

            contenedor.appendChild(edificioCard);
        }
    }
}

async function cargarCaracteristicas() {
    const select = document.getElementById("caracteristicas");

    try {
        const caracteristicas = await getCaracteristicas();

        select.innerHTML = ""; // limpiar por si acaso
        let optionninguna=document.createElement("option");
        optionninguna.value="ninguna";
        optionninguna.textContent="Ninguna";
        optionninguna.classList.add("bg-primary", "text-white");
        select.appendChild(optionninguna);

        caracteristicas.forEach(c => {
            const option = document.createElement("option");
            option.value = c.nombre;
            option.textContent = c.nombre;
            select.appendChild(option);
        });

        select.addEventListener("change", () => {
            const selected = Array.from(select.selectedOptions).map(o => o.value);

            if (selected.includes("ninguna")) {
                Array.from(select.options).forEach(opt => {
                    if(opt.value=="ninguna"){
                        opt.classList.add("bg-primary", "text-white");
                    }
                    opt.selected = opt.value == "";
                });
            }else{
                Array.from(select.options).forEach(opt => {
                    if(opt.value=="ninguna"){
                        opt.classList.remove("bg-primary", "text-white");
                    }
                });
            }
        });
    } catch (error) {
        console.error("Error cargando características:", error);
    }
}

async function filtrosGuardadosyCrearTarjetas(){
    const filtrosGuardados = sessionStorage.getItem("filtrosAulas");

    if (filtrosGuardados) {

        const filtros = JSON.parse(filtrosGuardados);

        // rellenar los inputs como tocan 
        document.getElementById("f_fecha").value = filtros.fecha;
        document.getElementById("f_hora_inicio").value = filtros.horaInicio || "00:00";
        document.getElementById("f_hora_fin").value = filtros.horaFin || "23:59";

        const select = document.getElementById("caracteristicas");

        Array.from(select.options).forEach(opt => {
            opt.selected = filtros.caracteristicas?.includes(opt.value);
        });

        // Volver a aplicar el filtro automáticamente
        let data;

        if (filtros.fecha && filtros.horaInicio && filtros.horaFin) {
            data = await getAulasDisponibles(
                filtros.fecha,
                filtros.horaInicio,
                filtros.horaFin
            );
        } else {
            data = await getAulas();
        }

        crearTarjetas(data, filtros.caracteristicas || []);

    } else {
        const data = await getAulas();
        crearTarjetas(data);
    }
}
</script>

            
        <footer id="footer"></footer>
    </body>
</html>
