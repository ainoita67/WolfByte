<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <!-- PRIMERO: Definir BASE -->
        <script>const BASE = window.location.origin + "/frontend";</script>
        <script>const API = window.location.origin + "/API";</script>

        <!-- Cargar authGuard PRIMERO -->
        <script src="/frontend/javascript/sesion/authGuard.js"></script>

        <!-- En menuadministrador.html y otras páginas de admin -->
        <script>
            const rol = Number(sessionStorage.getItem("rol"));
            
            // Admin (30) y super-admin (40) pueden acceder
            const script1 = document.createElement("script");
            script1.src = BASE + "/javascript/includes.js";
            script1.onload = () => {
                const script2 = document.createElement("script");
                script2.src = BASE + "/javascript/menu.js";
                script2.onload = () => {
                    generarPagina("portatiles", rol);
                };
                // posibles: aulas, salonactos, portatiles, espacios, incidencias, liberar, administrador
                document.head.appendChild(script2);
            };
            document.head.appendChild(script1);
        </script>
        <title>Portátiles - IES Bajo Aragón</title>
    </head>
    <body>

        <div id="header"></div>

        <main>
            <script src="../../../assets/daypilot/daypilot-all.min.js"></script>
            <link type="text/css" rel="stylesheet" href="../../../assets/css/calendar_green.css" />  
            
            <div class="container-fluid p-4">
                <div class="row g-4">

                    <aside class="d-none d-lg-block col-lg-2 mb-4"><!--vacio para dar margen--></aside>
                    
                    <!-- CALENDARIO -->
                    <section class="col-12 col-lg-8 d-flex flex-column mb-2 mb-lg-5">

                        <div class="row d-flex justify-content-between align-items-center mb-3">
                            <button id="prevWeek"
                                    type="button"
                                    class="btn btn-outline-secondary rounded-circle p-0 border-0"
                                    style="width: 2.5rem; height: 2.5rem;">
                                <i class="bi bi-arrow-left-circle fs-2"></i>
                            </button>

                            <button id="nextWeek"
                                    type="button"
                                    class="btn btn-outline-secondary rounded-circle p-0 border-0"
                                    style="width: 2.5rem; height: 2.5rem;">
                                <i class="bi bi-arrow-right-circle fs-2"></i>
                            </button>
                        </div>

                        <div id="dp" class="shadow-sm rounded-3 p-1"></div>

                    </section>

                    <!-- ASIDE INFORMACIÓN -->
                    <aside class="col-12 col-lg-2 mb-4">
                        <div class="d-none d-lg-block" style="height: 3.5rem;"></div>
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title" id="info-id">Carrito de portátiles</h5>
                                <hr>

                                <p><strong>Descripción:</strong></p>
                                <p id="info-descripcion" class="text-muted small"></p>
                                <p><strong>Unidades:</strong> <span id="info-unidades"></span></p>
                                <p><strong>Edificio:</strong> <span id="info-edificio"></span></p>
                                <p><strong>Planta:</strong> <span id="info-planta"></span></p>
                                <p><strong>Requiere autorización:</strong> <span id="info-especial"></span></p>


                            </div>
                        </div>
                    </aside>

                </div>
            </div>
<script type="module">
    
import { generarEventos } from "/frontend/javascript/portatiles/reservas/crud.js";
// cojer id de la url
document.addEventListener("DOMContentLoaded", async () => {
    const params = new URLSearchParams(window.location.search);
    const idAula = params.get("id");
    const carrito = await getCarrito(idAula);

    const dp = new DayPilot.Calendar("dp", {
        viewType: "WorkWeek",
        theme: "calendar_green",
        startDate: DayPilot.Date.today(),

        locale: "es-es",            // formato europeo
        headerDateFormat: "dd/MM/yyyy",
        weekStarts: 1,

        cellDuration: 5,
        cellHeight: 8, 
        businessBeginsHour: 8,
        businessEndsHour: 15,
        eventDeleteHandling: "Disabled",
        heightSpec: "BusinessHoursNoScroll",

    

    // 🎨 Cambiar cursor según tipo
   onBeforeEventRender: function(args) {
    args.data.cssClass = "cursor-pointer";

    // Si la reserva no está autorizada, se pinta de naranja
    if (args.data.autorizada === null) {
        args.data.backColor = "#cc6c11"; // naranja
        args.data.barColor = "#bb5c0f";
    }
},


    // 🧠 CLICK EN EVENTO
    onEventClick: async function(args) {

        const evento = args.e.data;
        const maxDisponibles = evento.unidades_libres || 0;
// 🟢 CREAR RESERVA (Disponible)
if (evento.bloqueBase) {

    const modal = await DayPilot.Modal.form([
        { name: "Asignatura", id: "asignatura", type: "text" },
        { name: "Grupo", id: "grupo", type: "text" },
        { name: "Profesor", id: "profesor", type: "text" },
        { name: "Actividad", id: "actividad", type: "text" },
        { name: "Observaciones", id: "observaciones", type: "textarea" },
        { 
            name: `Cantidad de portátiles (máx ${maxDisponibles})`,
            id: "unidades",
            type: "number",
            min: 1,
            max: maxDisponibles
        }
    ]);

    if (!modal.result) return;


    const requiereAutorizacion = carrito.autorizacion;
    const rol = parseInt(sessionStorage.getItem("rol"), 10);

    let autorizada;
    if (rol === 40 || rol === 30) {
        autorizada = 1;
    } else {
        autorizada = requiereAutorizacion ? null : 1;
        usuarioautoriza = requiereAutorizacion ? null : sessionStorage.getItem("id_usuario");
    }

    const response = await fetch(`${API}/portatiles/reservas`, {  // ✅ endpoint correcto
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + localStorage.getItem("token")
        },
        body: JSON.stringify({
            asignatura: modal.result.asignatura,
            grupo: modal.result.grupo,
            profesor: modal.result.profesor,
            observaciones: modal.result.observaciones,
            inicio: evento.start.replace("T", " "),
            fin: evento.end.replace("T", " "),
            unidades: parseInt(modal.result.unidades),
            id_material: idAula,          // ✅ id del carrito
            id_usuario: sessionStorage.getItem("id_usuario"),
            id_usuario_autoriza: usuarioautioriza,
            autorizada: autorizada,
            tipo: "Reserva_material"
        })
    });

if (!response.ok) {
    const err = await response.json();
    const mensaje = err.errors?.[0] ?? err.message ?? err.error ?? "No hay suficientes portátiles disponibles";
    alert(mensaje);
    return;
}
    const nuevosEventos = await generarEventos(idAula, carrito.unidades);
    dp.events.list = nuevosEventos;
    dp.update();
}

// 🔵 EDITAR RESERVA
else {

    const modal = await DayPilot.Modal.form([
        { name: "Asignatura", id: "asignatura", type: "text" },
        { name: "Grupo", id: "grupo", type: "text" },
        { name: "Profesor", id: "profesor", type: "text" },
        { name: "Actividad", id: "actividad", type: "text" },
        { name: "Observaciones", id: "observaciones", type: "textarea" },
        { name: "Cantidad de portátiles", id: "unidades", type: "number" }
    ], {
        asignatura: evento.asignatura,
        grupo: evento.grupo,
        profesor: evento.profesor,
        actividad: evento.actividad,
        observaciones: evento.observaciones,
        unidades: evento.unidades
    });

    if (!modal.result) return;

    const response = await fetch(`${API}/portatiles/reservas/${evento.id}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + localStorage.getItem("token")
        },
        body: JSON.stringify({
            asignatura: modal.result.asignatura,
            grupo: modal.result.grupo,
            profesor: modal.result.profesor,
            actividad: modal.result.actividad,
            observaciones: modal.result.observaciones,
            unidades: parseInt(modal.result.unidades),
            id_material: idAula,
            inicio: evento.start.replace("T", " "),
            fin: evento.end.replace("T", " ")
        })
    });

if (!response.ok) {
    const err = await response.json();
    const mensaje = err.errors?.[0] ?? err.message ?? err.error ?? "No hay suficientes portátiles disponibles";
    alert(mensaje);
    return;
}

    const nuevosEventos = await generarEventos(idAula, carrito.unidades);
    dp.events.list = nuevosEventos;
    dp.update();
}
    }

    });
    cargarInfoCarrito(carrito);
    const eventos = await generarEventos(idAula, carrito.unidades);

    dp.events.list = eventos;
    dp.init();


    // BOTONES SEMANA ANTERIOR Y SIGUIENTE
    document.getElementById("prevWeek").addEventListener("click", () => {
        dp.startDate = dp.startDate.addDays(-7);
        dp.update();
    });

    document.getElementById("nextWeek").addEventListener("click", () => {
        dp.startDate = dp.startDate.addDays(7);
        dp.update();
    });

    


});

document.getElementById("btnVolver").addEventListener("click", () => {
    window.location.href = `${BASE}/vistas/reservas/portatiles/portatiles.html`;
});


import { getCarrito } from "/frontend/javascript/portatiles/get.js";

async function cargarInfoCarrito(carrito) {

    if (!carrito) return;

    document.getElementById("info-id").textContent = 'Carrito de portátiles ' + carrito.id;
    document.getElementById("info-descripcion").textContent = carrito.descripcion;
    document.getElementById("info-edificio").textContent = carrito.edificio;
    document.getElementById("info-planta").textContent = carrito.planta;
    document.getElementById("info-unidades").textContent = carrito.unidades;
    document.getElementById("info-especial").textContent =
    carrito.autorizacion ? "Sí" : "No";

}



</script>


            <div class="divvolver container offset-md-1 offset-xl-2 p-0 pb-3 mt-0 mb-5 text-end fs-5">
                <button id="btnVolver" class="bg-azul border-0 rounded-pill p-1 px-3 ms-5 text-light"><i class="bi bi-caret-left-fill"></i> Volver</button>
            </div>
        </main>
        <footer id="footer"></footer>
    </body>
</html>
