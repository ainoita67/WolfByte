<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <script>const BASE = window.location.origin + "/frontend";</script>
        <script>const API = window.location.origin + "/API";</script>
        <script>
            const rol = sessionStorage.getItem("rol");
            const script1 = document.createElement("script");
            script1.src = BASE + "/javascript/includes.js";
            script1.onload = () => {
                const script2 = document.createElement("script");
                script2.src = BASE + "/javascript/menu.js";
                script2.onload = () => {
                generarPagina("perfil", rol);
                };
                document.head.appendChild(script2);
            };
            document.head.appendChild(script1);

            // authGuard
            const scriptAuth = document.createElement('script');
            scriptAuth.src = BASE + '/javascript/sesion/authGuard.js';
            document.head.appendChild(scriptAuth);
        </script>
        <title>Mis reservas - IES Bajo Aragón</title>
    </head>
    <body>

        <div id="header"></div>

        <main class="container mt-5">
            <h2 class="text-center mb-4">Mis reservas</h2>

            <!-- TARJETAS RESERVA -->
            <div class="row g-4" id="misReservasTarjetas">
            </div>

            <!-- MODAL RESERVA -->
            <div class="modal fade" id="modalReserva" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog modal-lg modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" id="modalReservaTitulo">Reserva</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                        </div>

                        <form id="formReserva">
                            <div class="modal-body container-fluid">
                                <div class="row g-3">
                                    <input type="hidden" id="reserva_id_usuario_autoriza" name="reserva_id_usuario_autoriza">
                                    <input type="hidden" id="reserva_autorizada" name="autorizada">
                                    <!-- ID reserva -->
                                    <div class="col-lg-6">
                                        <label class="form-label">ID Reserva</label>
                                        <input type="number" class="form-control" id="reserva_id" name="reserva_id" required readonly>
                                    </div>

                                    <!-- Fecha creación -->
                                    <div class="col-lg-6">
                                        <label class="form-label" for="reserva_f_creacion">F. creación</label>
                                        <input type="datetime-local" step="1" class="form-control" id="reserva_f_creacion" name="f_creacion" required readonly>
                                    </div>

                                    <!-- Inicio -->
                                    <div class="col-lg-6">
                                        <label class="form-label" for="reserva_inicio">Inicio</label>
                                        <input type="datetime-local" step="1" class="form-control" id="reserva_inicio" name="inicio" required>
                                    </div>

                                    <!-- Fin -->
                                    <div class="col-lg-6">
                                        <label class="form-label" for="reserva_fin">Fin</label>
                                        <input type="datetime-local" step="1" class="form-control" id="reserva_fin" name="fin" required>
                                    </div>

                                    <!-- Espacio/Portátil -->
                                    <div class="col-lg-6">
                                        <input type="hidden" id="reserva_tipo" name="tipo" required readonly>
                                        <label class="form-label" for="reserva_espacio_portatil">Espacio / Portátil</label>
                                        <input type="text" class="form-control" id="reserva_espacio_portatil" name="espacio_portatil" required readonly>
                                    </div>

                                    <!-- Asignatura -->
                                    <div class="col-lg-6">
                                        <label class="form-label" for="reserva_asignatura">Asignatura</label>
                                        <input type="text" class="form-control" id="reserva_asignatura" name="asignatura">
                                    </div>

                                    <!-- Grupo -->
                                    <div class="col-lg-6">
                                        <label class="form-label" for="reserva_grupo">Grupo</label>
                                        <input type="text" class="form-control" id="reserva_grupo" name="grupo" required>
                                    </div>

                                    <!-- Profesor -->
                                    <div class="col-lg-6">
                                        <label class="form-label" for="reserva_profesor">Profesor</label>
                                        <input type="text" class="form-control" id="reserva_profesor" name="profesor" required>
                                    </div>

                                    <!-- Usuario -->
                                    <div id="div_reserva_usuario">
                                        <input type="hidden" id="reserva_id_usuario" name="id_usuario" required readonly>
                                        <label class="form-label" for="reserva_usuario">Usuario</label>
                                        <input type="text" class="form-control" id="reserva_usuario" name="usuario" required readonly>
                                    </div>

                                    <!-- Unidades -->
                                    <div class="col-lg-6" id="div_reserva_unidades">
                                        <label class="form-label" for="reserva_unidades">Unidades</label>
                                        <input type="number" class="form-control" id="reserva_unidades" name="unidades" min="0" required>
                                    </div>

                                    <!-- Espacio en el que se usa -->
                                    <div class="col-lg-6" id="div_reserva_espacio_uso">
                                        <label class="form-label">Espacio en el que se usa</label>
                                        <select class="form-select selectEspacio" id="reserva_espacio_uso" name="espacio_uso" required>
                                        </select>
                                    </div>

                                    <!-- Actividad -->
                                    <div class="col-lg-6" id="div_reserva_actividad">
                                        <label class="form-label" for="reserva_actividad">Actividad</label>
                                        <input type="text" class="form-control" id="reserva_actividad" name="actividad" required>
                                    </div>

                                    <!-- Necesidades -->
                                    <div class="col-12" id="div_reserva_necesidades">
                                        <label class="form-label" for="reserva_necesidades">Necesidades</label>
                                        <select class="form-select selectMultipleNecesidad" id="reserva_necesidades" name="necesidades" multiple size="4">
                                        </select>
                                        <div class="form-text">Mantén Ctrl (Windows) / Cmd (Mac) para seleccionar varias.</div>
                                    </div>

                                    <!-- Observaciones -->
                                    <div class="col-12">
                                        <label class="form-label" for="reserva_observaciones">Observaciones</label>
                                        <textarea class="form-control" id="reserva_observaciones" name="observaciones" rows="3"></textarea>
                                    </div>
                                </div>
                            </div>
                            <div class="modal-footer d-flex justify-content-between">
                                <button type="submit" class="col-5 btn bg-azul border rounded-pill text-light"><i class="bi bi-check2"></i> Aplicar cambios</button>
                                <button type="button" class="col-5 btn bg-lightgrey border rounded-pill text-dark" data-bs-dismiss="modal"><i class="bi bi-x-lg"></i> Cancelar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- RELLENAR MODAL -->
            <script>
                const scriptgetreservas = document.createElement("script");
                scriptgetreservas.src = BASE + "/javascript/misReservas.js";
                document.head.appendChild(scriptgetreservas);

                scriptgetreservas.onload = () => {
                    obtenerMisReservas();
                    activarEditarReserva();
                }
                
                const scriptgetnecesidades = document.createElement("script");
                scriptgetnecesidades.src = BASE + "/javascript/necesidades/get.js";
                document.head.appendChild(scriptgetnecesidades);
                
                scriptgetnecesidades.onload = () => {
                    obtenerNecesidadesSelectMultiple();
                };
            </script>
            <div class="divvolver container p-0 pb-3 mt-0 mb-5 pe-4 pe-md-0 text-end fs-5">
                <a href="../menu.html" class="bg-azul rounded-pill p-2 px-3 ms-5 text-light"><i class="bi bi-caret-left-fill"></i> Volver</a>
            </div>
        </main>
        <footer id="footer"></footer>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
    </body>
</html>
