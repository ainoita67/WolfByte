<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <script>const BASE = window.location.origin + "/frontend";</script>
        <script>const API = window.location.origin + "/API";</script>
        <script>
            const rol = sessionStorage.getItem("rol");
            const script1 = document.createElement("script");
            script1.src = BASE + "/javascript/includes.js";
            script1.onload = () => {
                const script2 = document.createElement("script");
                script2.src = BASE + "/javascript/menu.js";
                script2.onload = () => {
                generarPagina("perfil", rol);
                };
                document.head.appendChild(script2);
            };
            document.head.appendChild(script1);

            // authGuard
            const scriptAuth = document.createElement('script');
            scriptAuth.src = BASE + '/javascript/sesion/authGuard.js';
            document.head.appendChild(scriptAuth);
        </script>
        <title>Mis reservas - IES Bajo Aragón</title>
    </head>
    <body>

        <div id="header"></div>

        <main class="container mt-5">
            <h2 class="text-center mb-4">Mis reservas</h2>

            <!-- TARJETAS RESERVA -->
            <div class="row g-4" id="misReservasTarjetas">
            </div>

            <!-- MODAL RESERVA -->
            <div class="modal fade" id="modalReserva" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog modal-lg modal-dialog-centered">
                    <div class="modal-content">

                        <div class="modal-header">
                            <h5 class="modal-title" id="modalReservaTitulo">Reserva</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                        </div>

                        <form id="formReserva" method="post" action="#">
                            <div class="modal-body row g-3">

                                <!-- ID reserva -->
                                <div class="col-md-4">
                                    <label class="form-label">ID Reserva</label>
                                    <input type="number" class="form-control" id="reserva_id" name="reserva_id" readonly>
                                </div>

                                <!-- Autorizada -->
                                <div class="col-md-8">
                                    <label class="form-label">Autorizada</label>
                                    <select class="form-select" id="reserva_autorizada" name="autorizada">
                                    <option value="pendiente">Pendiente</option>
                                    <option value="autorizada">Autorizada</option>
                                    <option value="denegada">Denegada</option>
                                    </select>
                                </div>

                                <!-- Inicio -->
                                <div class="col-md-6">
                                    <label class="form-label">Inicio</label>
                                    <input type="datetime-local" class="form-control" id="reserva_inicio" name="inicio">
                                </div>

                                <!-- Fin -->
                                <div class="col-md-6">
                                    <label class="form-label">Fin</label>
                                    <input type="datetime-local" class="form-control" id="reserva_fin" name="fin">
                                </div>

                                <!-- Espacio/Portátil -->
                                <div class="col-md-6">
                                    <label class="form-label">Espacio / Portátil</label>
                                    <input type="text" class="form-control" id="reserva_espacio_portatil" name="espacio_portatil">
                                </div>

                                <!-- Unidades -->
                                <div class="col-md-6">
                                    <label class="form-label">Unidades</label>
                                    <input type="number" class="form-control" id="reserva_unidades" name="unidades" min="0">
                                </div>

                                <!-- Asignatura -->
                                <div class="col-md-6">
                                    <label class="form-label">Asignatura</label>
                                    <input type="text" class="form-control" id="reserva_asignatura" name="asignatura">
                                </div>

                                <!-- Grupo -->
                                <div class="col-md-6">
                                    <label class="form-label">Grupo</label>
                                    <input type="text" class="form-control" id="reserva_grupo" name="grupo">
                                </div>

                                <!-- Profesor -->
                                <div class="col-md-6">
                                    <label class="form-label">Profesor</label>
                                    <input type="text" class="form-control" id="reserva_profesor" name="profesor">
                                </div>

                                <!-- Fecha creación -->
                                <div class="col-md-6">
                                    <label class="form-label">F. creación</label>
                                    <input type="datetime-local" class="form-control" id="reserva_f_creacion" name="f_creacion" readonly>
                                </div>

                                <!-- Actividad -->
                                <div class="col-md-6">
                                    <label class="form-label">Actividad</label>
                                    <input type="text" class="form-control" id="reserva_actividad" name="actividad">
                                </div>

                                <!-- Espacio en el que se usa -->
                                <div class="col-md-6">
                                    <label class="form-label">Espacio en el que se usa</label>
                                    <input type="text" class="form-control" id="reserva_espacio_uso" name="espacio_uso">
                                </div>

                                <!-- Necesidades -->
                                <div class="col-12">
                                    <label class="form-label">Necesidades</label>
                                    <select class="form-select" id="reserva_necesidades" name="necesidades[]" multiple size="4">
                                    <option value="proyector">Proyector</option>
                                    <option value="altavoces">Altavoces</option>
                                    <option value="microfono">Micrófono</option>
                                    <option value="pizarra_digital">Pizarra digital</option>
                                    </select>
                                    <div class="form-text">Mantén Ctrl (Windows) / Cmd (Mac) para seleccionar varias.</div>
                                </div>

                                <!-- Observaciones -->
                                <div class="col-12">
                                    <label class="form-label">Observaciones</label>
                                    <textarea class="form-control" id="reserva_observaciones" name="observaciones" rows="3"></textarea>
                                </div>
                            </div>
                            <div class="modal-footer d-flex justify-content-between">
                                <button type="submit" class="col-5 btn bg-azul border rounded-pill text-light"><i class="bi bi-check2"></i> Guardar cambios</button>
                                <button type="button" class="col-5 btn bg-lightgrey border rounded-pill text-dark" data-bs-dismiss="modal"><i class="bi bi-x-lg"></i> Cancelar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

<!-- RELLENAR MODAL -->

            <script>
            const modalReserva = document.getElementById('modalReserva');

            modalReserva.addEventListener('show.bs.modal', function (event) {
                const card = event.relatedTarget; // la tarjeta clicada

                // leer data attributes
                const id = card.getAttribute('data-id');
                // rellenar formulario
                document.getElementById('reserva_id').value = id;
            });

            const scriptgetreservas = document.createElement("script");
            scriptgetreservas.src = BASE + "/javascript/reservas/get.js";
            document.head.appendChild(scriptgetreservas);

			scriptgetreservas.onload = () => {
                obtenerMisReservas()
            }

            const scriptpostreservas = document.createElement("script");
            scriptpostreservas.src = BASE + "/javascript/reservas/post.js";
            document.head.appendChild(scriptpostreservas);

			scriptpostreservas.onload = () => {
                activarEditarTarjetasReserva()
            }
            </script>
            <div class="divvolver container p-0 pb-3 mt-0 mb-5 pe-4 pe-md-0 text-end fs-5">
                <a href="../menu.html" class="bg-azul rounded-pill p-2 px-3 ms-5 text-light"><i class="bi bi-caret-left-fill"></i> Volver</a>
            </div>
        </main>
        <footer id="footer"></footer>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
    crossorigin="anonymous"></script>
    </body>
    <!-- Bootstrap JS -->

</html>
