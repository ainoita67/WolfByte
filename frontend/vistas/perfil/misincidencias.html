<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <script>const BASE = window.location.origin + "/frontend";</script>
    <script>const API = window.location.origin + "/API";</script>
    
    <!-- Cargar authGuard primero para asegurar que tenemos los datos del usuario -->
    <script src="../../../javascript/sesion/authGuard.js"></script>
    
    <script>
        // Cargar includes.js después de authGuard
        const script1 = document.createElement("script");
        script1.src = BASE + "/javascript/includes.js";
        script1.onload = () => {
            const script2 = document.createElement("script");
            script2.src = BASE + "/javascript/menu.js";
            script2.onload = () => {
                generarPagina("menu", sessionStorage.getItem("rol"));
                
                // Cargar el script de mis incidencias después de generar la página
                const scriptMisIncidencias = document.createElement("script");
                scriptMisIncidencias.src = BASE + "/javascript/misincidencias/misincidencias.js";
                scriptMisIncidencias.onload = () => {
                    console.log('Script misincidencias cargado');
                    // Llamar a la función para obtener incidencias
                    if (typeof obtenerMisIncidencias === 'function') {
                        obtenerMisIncidencias();
                    }
                    
                    // Añadir event listener al formulario
                    document.getElementById('formincidencia').addEventListener('submit', guardarCambiosIncidencia);
                };
                document.head.appendChild(scriptMisIncidencias);
            };
            document.head.appendChild(script2);
        };
        document.head.appendChild(script1);
    </script>

    <title>Mis incidencias - IES Bajo Aragón</title>
</head>
<body>

    <div id="header"></div>

    <main class="container mt-5">
        <h2 class="text-center mb-4">Mis incidencias</h2>
        
        <!-- Contenedor de tarjetas -->
        <div class="row g-4 mt-4" id="tarjetasIncidencias">
            <!-- Loading spinner -->
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
                <p class="mt-3">Cargando tus incidencias...</p>
            </div>
        </div>

        <!-- Botón volver -->
        <div class="text-center mt-4 mb-5">
            <a href="../perfil/datos.html" class="btn bg-azul text-white rounded-pill px-4">
                <i class="bi bi-arrow-left"></i> Volver a mis datos
            </a>
        </div>
    </main>

    <!-- MODAL incidencia -->
    <div class="modal fade" id="modalincidencia" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalincidenciaTitulo">Detalle de incidencia</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>

                <form id="formincidencia">
                    <div class="modal-body container-fluid">
                        <div class="row g-3">
                            <!-- ID -->
                            <div class="col-md-4">
                                <label class="form-label" for="incidencia_id">ID</label>
                                <input type="number" class="form-control" id="incidencia_id" name="id" readonly>
                            </div>

                            <!-- Fecha -->
                            <div class="col-md-8">
                                <label class="form-label" for="incidencia_fecha">Fecha</label>
                                <input type="datetime-local" step="1" class="form-control" id="incidencia_fecha" name="fecha" readonly>
                            </div>

                            <!-- Título -->
                            <div class="col-12">
                                <label class="form-label" for="incidencia_titulo">Título</label>
                                <input type="text" class="form-control" id="incidencia_titulo" name="titulo" readonly>
                            </div>

                            <!-- Descripción -->
                            <div class="col-12">
                                <label class="form-label" for="incidencia_descripcion">Descripción</label>
                                <textarea class="form-control" id="incidencia_descripcion" name="descripcion" rows="3" readonly></textarea>
                            </div>

                            <!-- Usuario -->
                            <div class="col-md-6">
                                <input type="hidden" class="form-control" id="incidencia_id_usuario" name="idusuario" readonly>
                                <label class="form-label" for="incidencia_usuario">Usuario</label>
                                <input type="text" class="form-control" id="incidencia_usuario" name="usuario" readonly>
                            </div>

                            <!-- Recurso -->
                            <div class="col-md-6">
                                <label class="form-label" for="incidencia_recurso">Recurso</label>
                                <input type="text" class="form-control" id="incidencia_recurso" name="recurso" readonly>
                            </div>

                            <!-- Estado -->
                            <div class="col-md-6">
                                <label class="form-label" for="incidencia_estado">Estado</label>
                                <input type="text" class="form-control" id="incidencia_estado" name="estado" readonly>
                            </div>

                            <!-- Prioridad -->
                            <div class="col-md-6">
                                <label class="form-label" for="incidencia_prioridad">Prioridad</label>
                                <input type="text" class="form-control" id="incidencia_prioridad" name="prioridad" readonly>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer d-flex justify-content-between">
                        <button type="submit" class="col-5 btn bg-azul border rounded-pill text-light d-none" id="btnGuardarCambios">
                            <i class="bi bi-check2"></i> Guardar cambios
                        </button>
                        <button type="button" class="col-5 btn bg-lightgrey border rounded-pill text-dark" data-bs-dismiss="modal">
                            <i class="bi bi-x-lg"></i> Cerrar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer id="footer"></footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
</body>
</html>
