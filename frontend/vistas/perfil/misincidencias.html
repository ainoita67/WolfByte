<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <script>const BASE = window.location.origin + "/frontend";
    const API = window.location.origin + "/API";</script>

    <!-- Cargar authGuard PRIMERO -->
    <script src="../../../javascript/sesion/authGuard.js"></script>

    <!-- Verificación de acceso -->
    <script>
        setTimeout(function() {
            const rol = Number(sessionStorage.getItem("rol"));
            console.log('Rol después de authGuard:', rol);
            
            const script1 = document.createElement("script");
            script1.src = BASE + "/javascript/includes.js";
            script1.onload = () => {
                const script2 = document.createElement("script");
                script2.src = BASE + "/javascript/menu.js";
                script2.onload = () => {
                    generarPagina("menu", "admin");
                    
                    const scriptMisIncidencias = document.createElement("script");
                    scriptMisIncidencias.src = BASE + "/javascript/misincidencias/misincidencias.js";
                    
                    scriptMisIncidencias.onload = () => {
                        console.log('Script misincidencias cargado');
                        if (typeof obtenerMisIncidencias === 'function') {
                            obtenerMisIncidencias();
                        }
                    };
                    
                    scriptMisIncidencias.onerror = () => {
                        console.error('Error al cargar misincidencias.js');
                    };
                    
                    document.head.appendChild(scriptMisIncidencias);
                };
                document.head.appendChild(script2);
            };
            document.head.appendChild(script1);
        }, 100);
    </script>

    <title>Mis incidencias - IES Bajo Aragón</title>
    
    <style>
        .bg-azul {
            background-color: #0d6efd;
        }
        .bg-lightgrey {
            background-color: #f8f9fa;
        }
        .incidencia-card {
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .incidencia-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2) !important;
        }
        .card-body {
            flex: 1;
        }
        .card-footer-actions {
            background-color: transparent;
            border-top: 1px solid rgba(0,0,0,0.1);
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
        }
        .btn-footer-action {
            border: none;
            border-radius: 4px;
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            transition: all 0.2s;
        }
        .btn-footer-edit {
            background-color: #ffc107;
            color: #000;
        }
        .btn-footer-edit:hover {
            background-color: #e0a800;
        }
        .btn-footer-delete {
            background-color: #dc3545;
            color: #fff;
        }
        .btn-footer-delete:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>

    <div id="header"></div>

    <main class="container mt-5">
        <!-- CABECERA con botón crear -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Mis incidencias</h2>
            <a href="../incidencias/incidencias.html" class="btn btn-success">
                <i class="bi bi-plus-circle"></i> Nueva incidencia
            </a>
        </div>

        <!-- CONTENEDOR DE TARJETAS -->
        <div id="tarjetasIncidencias" class="row g-4">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
                <p class="mt-2">Cargando tus incidencias...</p>
            </div>
        </div>

        <!-- VOLVER -->
        <div class="divvolver container p-0 pb-3 mb-5 mt-0 text-end fs-5">
            <a href="../perfil/datos.html" class="bg-azul rounded-pill p-2 px-3 text-light">
                <i class="bi bi-caret-left-fill"></i> Volver
            </a>
        </div>
    </main>

    <!-- MODAL INCIDENCIA (VER/EDITAR) -->
    <div class="modal fade" id="modalincidencia" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="bi bi-info-circle-fill me-2"></i>
                        Detalle de incidencia
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="formincidencia">
                        <input type="hidden" id="incidencia_id" name="id">
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">ID Incidencia</label>
                                <input type="text" class="form-control" id="incidencia_id_display" readonly disabled>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Fecha</label>
                                <input type="datetime-local" step="1" class="form-control" id="incidencia_fecha" name="fecha" readonly>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Título</label>
                            <input type="text" class="form-control" id="incidencia_titulo" name="titulo">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Descripción</label>
                            <textarea class="form-control" id="incidencia_descripcion" name="descripcion" rows="3"></textarea>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Usuario</label>
                                <input type="text" class="form-control" id="incidencia_usuario" name="usuario" readonly>
                                <input type="hidden" id="incidencia_id_usuario" name="idusuario">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Recurso</label>
                                <input type="text" class="form-control" id="incidencia_recurso" name="recurso" readonly>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Estado</label>
                                <select class="form-select" id="incidencia_estado" name="estado">
                                    <option value="Abierta">Abierta</option>
                                    <option value="En proceso">En proceso</option>
                                    <option value="Resuelta">Resuelta</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Prioridad</label>
                                <select class="form-select" id="incidencia_prioridad" name="prioridad">
                                    <option value="Baja">Baja</option>
                                    <option value="Media">Media</option>
                                    <option value="Alta">Alta</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="modal-footer">
                            <button type="button" class="btn btn-danger" id="btnEliminarModal">
                                <i class="bi bi-trash"></i> Eliminar
                            </button>
                            <button type="submit" class="btn btn-primary" id="btnGuardarCambios">
                                <i class="bi bi-check-lg"></i> Guardar cambios
                            </button>
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                                <i class="bi bi-x-lg"></i> Cerrar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL CONFIRMAR ELIMINACIÓN -->
    <div class="modal fade" id="modalConfirmarEliminar" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        Confirmar eliminación
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>¿Estás seguro de que quieres eliminar esta incidencia?</p>
                    <p class="fw-bold" id="incidenciaTituloEliminar"></p>
                    <p class="text-muted small">Esta acción no se puede deshacer.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="bi bi-x-lg"></i> Cancelar
                    </button>
                    <button type="button" class="btn btn-danger" id="btnConfirmarEliminar">
                        <i class="bi bi-trash"></i> Eliminar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer id="footer"></footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
