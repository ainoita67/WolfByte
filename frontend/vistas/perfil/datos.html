<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <!-- SE CREA EL BASE PATH PARA USAR EN TODOS LOS SCRIPTS, ENLACES Y REDIRECCIONES-->
        <script>const BASE = window.location.origin + "/frontend";</script>
        <script>const API = window.location.origin + "/API";</script>
        <!--
        AÑADE:
            <script src="/frontend/javascript/includes.js"></script>
            <script src="/frontend/javascript/menu.js"></script>
        QUE GENERAN EL RESTO DE ENLACES DEL HEAD Y EL HEADER, NAV Y FOOTER
        -->
        <script>
            const rol = sessionStorage.getItem("rol");
            const script1 = document.createElement("script");
            script1.src = BASE + "/javascript/includes.js";
            script1.onload = () => {
                const script2 = document.createElement("script");
                script2.src = BASE + "/javascript/menu.js";
                script2.onload = () => {
                generarPagina("perfil", rol);
                };
                // posibles: aulas, salonactos, portatiles, espacios, incidencias, liberar, administrador
                document.head.appendChild(script2);
            };
            document.head.appendChild(script1);

            // authGuard
            const scriptAuth = document.createElement('script');
            scriptAuth.src = BASE + '/javascript/sesion/authGuard.js';
            document.head.appendChild(scriptAuth);
        </script>
        <title>Mis datos - IES Bajo Aragón</title>
    </head>
    <body>

        <div id="header"></div>

        <main class="row justify-content-center align-items-center main-content">
            <div class="col-11 col-sm-8 col-md-6 col-lg-4">
                <div class="card shadow p-4 text-center">
                    <h5 class="mb-4 fw-bold">Mis datos</h5>

                    <div class="mb-3 text-start">
                        <label class="form-label fw-semibold">Usuario:</label>
                        <input type="text" class="form-control" id="nombre" readonly>
                    </div>

                    <div class="mb-3 text-start">
                        <label class="form-label fw-semibold">Correo:</label>
                        <input type="email" class="form-control" id="correo" readonly>
                    </div>

                    <div class="mb-4 text-start">
                        <label class="form-label fw-semibold">Rol:</label>
                        <input type="text" class="form-control" id="rol" readonly>
                    </div>

                    <div class="d-flex justify-content-center gap-5 mb-3 px-4">
                        <a href="misreservas.html" class="enviar p-2 px-4 col-6">Mis reservas</a>
                        <a href="misincidencias.html" class="enviar p-2 px-4 col-6">Mis incidencias</a>
                    </div>

                    <a href="/frontend/vistas/menu.html" class="volver p-2 px-4 text-dark">Volver al menú principal</a>
                </div>
            </div>
        </main>
        <footer id="footer"></footer>
    </body>
    <script type="module">
import { getUsuarioById } from "/frontend/javascript/gestion_usuarios/get.js";

document.addEventListener("DOMContentLoaded", async () => {
    const usuarioId = sessionStorage.getItem("id_usuario");
    console.log("Cargando datos para usuario ID:", usuarioId);

    getUsuarioById(usuarioId).then(usuario => {
        if (usuario) {
            console.log("Usuario cargado:", usuario);
            document.getElementById("nombre").value = usuario.nombre;
            document.getElementById("correo").value = usuario.correo;
            document.getElementById("rol").value = usuario.rol.rol;
        } else {
            console.error("No se pudo cargar la información del usuario.");
        }
    }).catch(error => {
        console.error("Error al obtener los datos del usuario:", error);
    });
});
    </script>
</html>
